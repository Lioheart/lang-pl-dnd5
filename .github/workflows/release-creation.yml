name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract Version From Tag
        id: extract_version
        shell: bash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Populate Versioned keys in Manifest
        shell: bash
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          REPOSITORY="${{ github.repository }}"
          TAG_NAME="${{ github.event.release.tag_name }}"

          jq \
            --arg version "$VERSION" \
            --arg url "https://github.com/$REPOSITORY" \
            --arg manifest "https://github.com/$REPOSITORY/releases/latest/download/module.json" \
            --arg download "https://github.com/$REPOSITORY/releases/download/$TAG_NAME/module.zip" \
            '.version = $version
             | .url = $url
             | .manifest = $manifest
             | .download = $download' \
            module.json > module.tmp.json

          mv module.tmp.json module.json

      - name: Create Module Archive
        run: |
          zip --recurse-paths ./module.zip \
            module.json babele-register.js lang/ scripts/ static/ styles/

      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.draft }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
